<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is This AI?</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #141420;
            color: #e8e8f0;
            font-family: 'Georgia', 'Times New Roman', serif;
            line-height: 1.8;
            font-size: 18px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* === Language toggle === */
        .lang-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            background: #2a2a44;
            border: 1px solid #4a4a70;
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            font-family: sans-serif;
            color: #a0a0d0;
            z-index: 100;
            transition: background 0.2s;
        }
        .lang-toggle:hover { background: #363658; }

        /* === Hero === */
        .hero {
            text-align: center;
            padding: 80px 24px 50px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .tag {
            background: #1c1c2e;
            color: #8888b0;
            border: 1px solid #2a2a40;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            font-family: sans-serif;
            letter-spacing: 0.3px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .hero p {
            color: #666;
            font-size: 16px;
            font-family: sans-serif;
            margin: 0;
        }

        /* === Game card === */
        .game-area {
            padding: 40px 0 80px;
        }

        .item-card {
            background: #1c1c2e;
            border: 1px solid #2a2a40;
            border-radius: 14px;
            padding: 40px 40px 36px;
            position: relative;
        }

        .item-number {
            font-size: 12px;
            font-family: sans-serif;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .item-name {
            font-size: 34px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .item-context {
            font-size: 17px;
            color: #777;
            margin-bottom: 32px;
            font-style: italic;
            line-height: 1.7;
        }

        /* === Vote buttons === */
        .vote-row {
            display: flex;
            gap: 10px;
        }

        .btn-vote {
            flex: 1;
            padding: 12px 10px;
            border-radius: 8px;
            font-size: 14px;
            font-family: sans-serif;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            border: 1px solid #3a3a55;
            background: #2a2a44;
            color: #a0a0d0;
        }
        .btn-vote:hover { background: #363658; border-color: #5a5a80; }
        .btn-vote:disabled { opacity: 0.4; cursor: default; }

        /* Chosen vote highlight */
        .btn-vote.voted-ai      { background: #1a3a2a; border-color: #40a868; color: #70e898; opacity: 1; }
        .btn-vote.voted-not     { background: #1e1e34; border-color: #4a4a80; color: #9090c0; opacity: 1; }
        .btn-vote.voted-depends { background: #2a1e08; border-color: #806020; color: #c09030; opacity: 1; }

        /* === Reveal === */
        .reveal-area {
            display: none;
            margin-top: 28px;
            padding-top: 28px;
            border-top: 1px solid #2a2a40;
        }

        .reveal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .verdict {
            display: inline-block;
            font-size: 13px;
            font-family: sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 20px;
        }
        .verdict-ai      { background: #1a3a2a; border: 1px solid #40a868; color: #70e898; }
        .verdict-not     { background: #22223a; border: 1px solid #44447a; color: #8888b0; }
        .verdict-depends { background: #2a2010; border: 1px solid #806020; color: #c09030; }

        .result-indicator {
            font-size: 13px;
            font-family: sans-serif;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .result-correct { color: #70e898; }
        .result-wrong   { color: #e07858; }

        .reveal-text {
            font-size: 16px;
            color: #999;
            line-height: 1.7;
        }

        /* === Navigation === */
        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
        }

        .btn-nav {
            background: transparent;
            border: 1px solid #2a2a40;
            border-radius: 6px;
            padding: 8px 20px;
            color: #555;
            font-size: 14px;
            font-family: sans-serif;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-nav:hover { border-color: #4a4a70; color: #a0a0d0; }
        .btn-nav:disabled { opacity: 0.2; cursor: default; }

        .progress {
            font-size: 12px;
            font-family: sans-serif;
            color: #333;
            letter-spacing: 0.5px;
        }

        /* === Done screen === */
        .done-screen {
            display: none;
            text-align: center;
            padding: 40px 20px 60px;
        }

        .score-display {
            font-size: 64px;
            font-weight: 700;
            font-family: sans-serif;
            color: #fff;
            line-height: 1;
            margin-bottom: 6px;
        }

        .score-label {
            display: block;
            font-size: 15px;
            font-family: sans-serif;
            color: #444;
            margin-bottom: 36px;
            letter-spacing: 0.5px;
        }

        .badge-container {
            margin: 0 auto 32px;
            max-width: 380px;
        }

        .badge-img {
            width: 100%;
            border-radius: 12px;
            display: block;
            margin-bottom: 12px;
        }

        .badge-download-btn {
            display: inline-block;
            background: #1c1c2e;
            border: 1px solid #2a2a40;
            border-radius: 6px;
            padding: 7px 18px;
            font-size: 13px;
            font-family: sans-serif;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
            color: #555;
        }
        .badge-download-btn:hover { border-color: #4a4a70; color: #a0a0d0; text-decoration: none; }

        .done-screen h2 {
            font-size: 26px;
            color: #fff;
            margin-bottom: 14px;
            line-height: 1.3;
        }

        .done-screen > p {
            font-size: 16px;
            color: #666;
            font-family: sans-serif;
            max-width: 460px;
            margin: 0 auto 28px;
            line-height: 1.7;
        }

        .movie-links {
            margin-bottom: 32px;
            font-family: sans-serif;
        }

        .movie-links-label {
            color: #444;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .movie-links a { color: #6688cc; }
        .movie-links a:hover { text-decoration: underline; }

        .btn-restart {
            margin-top: 8px;
            background: #2a2a44;
            border: 1px solid #4a4a70;
            border-radius: 8px;
            padding: 12px 28px;
            color: #a0a0d0;
            font-size: 15px;
            font-family: sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-restart:hover { background: #363658; }

        /* === Ghost in the Shell theme === */
        @keyframes ghostGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(0,255,200,0.25); }
            50%       { text-shadow: 0 0 44px rgba(0,255,200,0.55); }
        }
        .theme-gits .score-display { color: #00ffcc; animation: ghostGlow 3s ease-in-out infinite; }
        .theme-gits h2             { color: #00ffcc; animation: ghostGlow 3s ease-in-out infinite; }
        .theme-gits .badge-img     { box-shadow: 0 0 40px rgba(0,255,200,0.2); }
        .theme-gits .movie-links a { color: #00ccaa; }

        /* === Blade Runner theme === */
        @keyframes bladeGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(255,160,50,0.25); }
            50%       { text-shadow: 0 0 44px rgba(255,160,50,0.55); }
        }
        .theme-bladerunner .score-display { color: #ffaa33; animation: bladeGlow 4s ease-in-out infinite; }
        .theme-bladerunner h2             { color: #ffaa33; animation: bladeGlow 4s ease-in-out infinite; }
        .theme-bladerunner .badge-img     { box-shadow: 0 0 40px rgba(255,160,50,0.15); }
        .theme-bladerunner .movie-links a { color: #cc8822; }

        /* === Links === */
        a { color: #80b4f0; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* === Footer === */
        footer { text-align: center; padding: 40px 24px; color: #444; font-size: 14px; }
        footer a { color: #555; }

        @media (max-width: 600px) {
            .hero h1    { font-size: 36px; }
            .item-name  { font-size: 26px; }
            .vote-row   { flex-direction: column; }
            .item-card  { padding: 28px 24px; }
            .score-display { font-size: 48px; }
            .progress   { font-size: 10px; letter-spacing: 0; }
        }
    </style>
</head>
<body>

<button class="lang-toggle" onclick="toggleLang()">DE</button>

<div class="hero">
    <div class="tags">
        <span class="tag">all</span>
        <span class="tag">no-code</span>
        <span class="tag">intermediate</span>
        <span class="tag">try-without-ai</span>
        <span class="tag">ml-fundamentals</span>
    </div>
    <h1 data-i18n="hero.title">Is This AI?</h1>
    <p data-i18n="hero.sub">Vote first. Then find out.</p>
</div>

<div class="container">
<div class="game-area">

    <div class="item-card" id="item-card">
        <div class="item-number" id="item-number">1 / 12</div>
        <div class="item-name" id="item-name"></div>
        <div class="item-context" id="item-context"></div>
        <div class="vote-row">
            <button class="btn-vote" id="btn-yes"     onclick="vote('ai')"      data-i18n="vote.yes">Yes, AI</button>
            <button class="btn-vote" id="btn-depends" onclick="vote('depends')" data-i18n="vote.depends">It Depends</button>
            <button class="btn-vote" id="btn-no"      onclick="vote('not')"     data-i18n="vote.no">Not AI</button>
        </div>
        <div class="reveal-area" id="reveal-area">
            <div class="reveal-header">
                <span class="verdict" id="verdict-badge"></span>
                <span class="result-indicator" id="result-indicator"></span>
            </div>
            <div class="reveal-text" id="reveal-text"></div>
        </div>
        <div class="nav-row">
            <button class="btn-nav" id="btn-prev" onclick="navigate(-1)" disabled data-i18n="nav.prev">← prev</button>
            <span class="progress" id="progress-dots"></span>
            <button class="btn-nav" id="btn-next" data-i18n="nav.next">next →</button>
        </div>
    </div>

    <div class="done-screen" id="done-screen">
        <div class="score-display" id="score-num">0</div>
        <span class="score-label" id="score-label" data-i18n="done.score_label">/ 12 correct</span>
        <div class="badge-container">
            <img id="badge-img" class="badge-img" src="" alt="Your AI Detective Badge">
            <a id="badge-download" class="badge-download-btn" href="" download data-i18n="done.save_badge">↓ Save badge</a>
        </div>
        <h2 id="done-title"></h2>
        <p id="done-sub"></p>
        <div id="movie-links" class="movie-links"></div>
        <button class="btn-restart" onclick="restart()" data-i18n="done.restart">Start over</button>
    </div>

</div>
</div>

<footer>
    <a href="https://github.com/i-yam/is_this_ai" target="_blank">github.com/i-yam/is_this_ai</a>
    &nbsp;·&nbsp;
    <a href="https://i-yam.github.io/overfit-and-chill" target="_blank">overfit &amp; chill</a>
</footer>

<script>

const items = [
    {
        name: 'Calculator',
        context: 'You type 2 + 2. It says 4. You type it again tomorrow. It says 4.',
        verdict: 'not',
        label: 'Not AI',
        text: 'Fixed rules. No data, no learning, no adaptation. Every input maps to exactly one output, always. A very good tool.'
    },
    {
        name: 'Spam Filter',
        context: 'You never see 99% of the junk sent to your inbox. Something is deciding.',
        verdict: 'ai',
        label: 'AI',
        text: 'Trained on millions of labeled emails. It learned what spam looks like. The filter you have today is not the one that shipped ten years ago.'
    },
    {
        name: 'Google Search',
        context: 'You type "good coffee near me" without specifying what "near" or "good" means.',
        verdict: 'depends',
        label: 'It depends',
        text: 'Crawling and indexing pages is algorithmic. Understanding what you meant when you typed it, and ranking results for your context, uses machine learning. The same search box, two different mechanisms.'
    },
    {
        name: 'GPS Navigation',
        context: 'It tells you to take a different route than yesterday for the same journey.',
        verdict: 'depends',
        label: 'It depends',
        text: 'Finding the shortest path is a graph algorithm, decades old. Predicting where traffic will slow down in 20 minutes is machine learning trained on millions of past journeys.'
    },
    {
        name: 'Face ID',
        context: 'It unlocks when you look at it. Even after you got a haircut.',
        verdict: 'ai',
        label: 'AI',
        text: 'A neural network trained on face data. It does not compare a stored photo. It learned what makes your face yours, and it updates that model over time.'
    },
    {
        name: 'Autocorrect',
        context: 'Sometimes it fixes "teh" to "the". Sometimes it finishes your entire sentence.',
        verdict: 'depends',
        label: 'It depends',
        text: 'Correcting common typos is a lookup table. Predicting the next word in your sentence is a language model. The same keyboard, two very different things happening underneath.'
    },
    {
        name: 'Thermostat',
        context: 'The old kind. The dial on the wall.',
        verdict: 'not',
        label: 'Not AI',
        text: 'If temperature drops below X, turn on heat. The rule never changes. No data, no learning. It has one job and it does not need to think.'
    },
    {
        name: 'Netflix Recommendations',
        context: 'It suggested something you never searched for. You watched it for three hours.',
        verdict: 'ai',
        label: 'AI',
        text: 'Collaborative filtering trained on millions of viewing patterns. When it recommends something you did not ask for and you watch it, that is the system doing exactly what it was optimized to do.'
    },
    {
        name: 'Shazam',
        context: 'You hold your phone up in a loud bar. It names the song in four seconds.',
        verdict: 'ai',
        label: 'AI',
        text: 'It does not compare the raw audio to a stored recording. It extracts spectral fingerprints and matches them against a database built from machine learning. Works with noise, distortion, and a cheap microphone.'
    },
    {
        name: 'Excel Sort',
        context: 'You select a column, click Sort A→Z, and the rows rearrange.',
        verdict: 'not',
        label: 'Not AI',
        text: 'A deterministic sorting algorithm. Same column, same result, every time. No training, no model, no inference. Very fast and completely uninteresting from a machine learning standpoint.'
    },
    {
        name: 'Fraud Detection',
        context: 'Your card gets declined in a city you have never visited. You did not call the bank.',
        verdict: 'ai',
        label: 'AI',
        text: 'Pattern recognition trained on millions of transactions. It learned what your spending looks like. When something deviates, it flags it. The rules were not written by a human. They were inferred from data.'
    },
    {
        name: 'Weather Forecast',
        context: 'The app says 73% chance of rain at 4 pm. Not "it might rain." A percentage.',
        verdict: 'depends',
        label: 'It depends',
        text: 'The underlying physics model is classical: differential equations, decades old. The probability estimate and local fine-tuning are machine learning trained on historical forecast errors. A 73% figure is not a rule. It is a learned calibration.'
    }
];

const verdictClass = { ai: 'verdict-ai', not: 'verdict-not', depends: 'verdict-depends' };
const voteClass    = { ai: 'voted-ai',   not: 'voted-not',   depends: 'voted-depends' };

let idx       = 0;
let userVotes = new Array(items.length).fill(null);

function render() {
    const item     = items[idx];
    const hasVoted = userVotes[idx] !== null;

    document.getElementById('item-number').textContent  = (idx + 1) + ' / ' + items.length;
    document.getElementById('item-name').textContent    = item.name;
    document.getElementById('item-context').textContent = item.context;

    // Verdict badge
    const badge = document.getElementById('verdict-badge');
    badge.textContent = item.label;
    badge.className   = 'verdict ' + verdictClass[item.verdict];
    document.getElementById('reveal-text').textContent = item.text;

    // Result indicator
    const resultEl = document.getElementById('result-indicator');
    if (hasVoted) {
        const correct = userVotes[idx] === item.verdict;
        resultEl.textContent = correct
            ? (currentLang === 'de' ? '✓ richtig' : '✓ correct')
            : (currentLang === 'de' ? '✗ daneben' : '✗ not quite');
        resultEl.className = 'result-indicator ' + (correct ? 'result-correct' : 'result-wrong');
    } else {
        resultEl.textContent = '';
        resultEl.className   = 'result-indicator';
    }

    // Reveal area
    document.getElementById('reveal-area').style.display = hasVoted ? 'block' : 'none';

    // Vote buttons
    const btnYes     = document.getElementById('btn-yes');
    const btnDepends = document.getElementById('btn-depends');
    const btnNo      = document.getElementById('btn-no');

    [btnYes, btnDepends, btnNo].forEach(btn => {
        btn.disabled = hasVoted;
        btn.classList.remove('voted-ai', 'voted-not', 'voted-depends');
    });

    if (hasVoted) {
        const chosenBtn = { ai: btnYes, not: btnNo, depends: btnDepends }[userVotes[idx]];
        chosenBtn.classList.add(voteClass[userVotes[idx]]);
    }

    // Navigation
    document.getElementById('btn-prev').disabled = (idx === 0);

    const isLast  = idx === items.length - 1;
    const btnNext = document.getElementById('btn-next');
    if (isLast && hasVoted) {
        btnNext.textContent = currentLang === 'de' ? 'Fertig' : 'Done';
        btnNext.onclick     = finish;
        btnNext.disabled    = false;
    } else {
        btnNext.textContent = currentLang === 'de' ? 'weiter →' : 'next →';
        btnNext.onclick     = () => navigate(1);
        btnNext.disabled    = !hasVoted;
    }

    // Progress dots: ● current  ◆ voted  · not yet
    const dots = document.getElementById('progress-dots');
    dots.textContent = items.map((_, i) => {
        if (i === idx) return '●';
        return userVotes[i] !== null ? '◆' : '·';
    }).join(' ');
}

function vote(choice) {
    if (userVotes[idx] !== null) return;
    userVotes[idx] = choice;
    render();
}

function navigate(dir) {
    idx += dir;
    render();
}

function calcScore() {
    return items.reduce((score, item, i) => score + (userVotes[i] === item.verdict ? 1 : 0), 0);
}

function renderDone() {
    const score = calcScore();
    const isTop = score >= 10;
    const done  = document.getElementById('done-screen');

    document.getElementById('score-num').textContent = score;

    const imgSrc = isTop ? 'images/best.jpg' : 'images/default.jpg';
    document.getElementById('badge-img').src = imgSrc;
    const dl     = document.getElementById('badge-download');
    dl.href      = imgSrc;
    dl.download  = isTop ? 'ghost-in-the-shell-badge.jpg' : 'blade-runner-badge.jpg';

    if (isTop) {
        done.className = 'done-screen theme-gits';

        document.getElementById('done-title').textContent = currentLang === 'de'
            ? 'Du siehst den Geist in der Maschine.'
            : 'You see the ghost in the machine.';

        document.getElementById('done-sub').textContent = currentLang === 'de'
            ? score + ' von 12. Die meisten sehen nur die Oberfläche. Du siehst, was darunter läuft. Das ist selten.'
            : score + ' out of 12. Most people see the interface. You see what runs underneath. That is rare.';

        document.getElementById('movie-links').innerHTML =
            '<p class="movie-links-label">' +
            (currentLang === 'de' ? 'Du bist bereit dafür:' : 'You are ready for:') +
            '</p>' +
            '<a href="https://www.imdb.com/title/tt0113568/" target="_blank">Ghost in the Shell (1995)</a>' +
            ' &nbsp;·&nbsp; ' +
            '<a href="https://www.imdb.com/title/tt0346314/" target="_blank">Stand Alone Complex</a>' +
            ' &nbsp;·&nbsp; ' +
            '<a href="https://www.imdb.com/title/tt1219827/" target="_blank">Ghost in the Shell (2017)</a>';

    } else {
        done.className = 'done-screen theme-bladerunner';

        document.getElementById('done-title').textContent = currentLang === 'de'
            ? 'Selbst Deckard war sich nicht immer sicher.'
            : "Even Deckard wasn't always sure.";

        document.getElementById('done-sub').textContent = currentLang === 'de'
            ? score + ' von 12. Die Grenze zwischen Maschine und Geist ist unschärfer, als sie aussieht. Das ist der Punkt.'
            : score + ' out of 12. The line between machine and mind is blurrier than it looks. That is the point.';

        document.getElementById('movie-links').innerHTML =
            '<p class="movie-links-label">' +
            (currentLang === 'de' ? 'Pflichtprogramm:' : 'Required viewing:') +
            '</p>' +
            '<a href="https://www.imdb.com/title/tt0083658/" target="_blank">Blade Runner (1982)</a>' +
            ' &nbsp;·&nbsp; ' +
            '<a href="https://www.imdb.com/title/tt1856101/" target="_blank">Blade Runner 2049 (2017)</a>';
    }
}

function finish() {
    document.getElementById('item-card').style.display  = 'none';
    document.getElementById('done-screen').style.display = 'block';
    renderDone();
}

function restart() {
    idx       = 0;
    userVotes = new Array(items.length).fill(null);
    document.getElementById('item-card').style.display  = 'block';
    document.getElementById('done-screen').style.display = 'none';
    render();
}

// ─── Language toggle ─────────────────────────────────────────────────────────
const T = {
    en: {
        'hero.title':       'Is This AI?',
        'hero.sub':         'Vote first. Then find out.',
        'vote.yes':         'Yes, AI',
        'vote.depends':     'It Depends',
        'vote.no':          'Not AI',
        'nav.prev':         '← prev',
        'nav.next':         'next →',
        'done.score_label': '/ 12 correct',
        'done.save_badge':  '↓ Save badge',
        'done.restart':     'Start over',
    },
    de: {
        'hero.title':       'Ist das KI?',
        'hero.sub':         'Erst abstimmen. Dann schauen.',
        'vote.yes':         'Ja, KI',
        'vote.depends':     'Kommt drauf an',
        'vote.no':          'Keine KI',
        'nav.prev':         '← zurück',
        'nav.next':         'weiter →',
        'done.score_label': '/ 12 richtig',
        'done.save_badge':  '↓ Badge speichern',
        'done.restart':     'Nochmal',
    }
};

let currentLang = 'en';

function toggleLang() {
    currentLang = currentLang === 'en' ? 'de' : 'en';
    document.documentElement.lang = currentLang;
    document.querySelector('.lang-toggle').textContent = currentLang === 'en' ? 'DE' : 'EN';
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (T[currentLang] && T[currentLang][key]) el.textContent = T[currentLang][key];
    });
    const doneVisible = document.getElementById('done-screen').style.display === 'block';
    if (doneVisible) {
        renderDone();
    } else {
        render();
    }
}

// Init
render();

</script>
